<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Antrenman</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --card: #1c1c1c;
    --accent: #e8ff47; --text: #f0f0f0; --muted: #666;
    --border: #2a2a2a; --done: #2a3a1a; --done-border: #6abf3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; max-width: 430px;
    margin: 0 auto; padding-bottom: 88px;
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  .header {
    padding: 52px 20px 16px;
    background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 2px; line-height: 1; color: var(--accent);
  }
  .date-text { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px 5px 5px;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .user-pill:active { opacity: 0.7; }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: #000; font-weight: bold;
  }
  .user-pill-name { font-size: 13px; font-weight: 500; }

  /* WEEK NAV */
  .week-nav {
    display: flex; gap: 8px; margin-top: 14px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
  }
  .week-nav::-webkit-scrollbar { display: none; }
  .week-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .week-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 20px; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; text-align: center;
  }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px 16px; }
  .day-tab {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 6px; text-align: center;
    cursor: pointer; transition: all 0.2s;
  }
  .day-tab.active { background: var(--accent); border-color: var(--accent); }
  .day-tab.active .day-label, .day-tab.active .day-name { color: #000; }
  .day-tab.completed { border-color: var(--done-border); }
  .day-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .day-tab.active .day-label { color: #000; opacity: 0.6; }
  .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--text); margin-top: 2px; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; margin: 4px auto 0; background: transparent; }
  .day-tab.completed .day-dot { background: var(--done-border); }
  .day-tab.active .day-dot { background: #000; opacity: 0.4; }

  /* WORKOUT */
  .section-label { padding: 0 20px 8px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .workout-header { padding: 0 20px 16px; display: flex; justify-content: space-between; align-items: flex-end; }
  .workout-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; line-height: 1; }
  .workout-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .title-row { display: flex; align-items: baseline; gap: 8px; }
  .edit-day-btn { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .edit-day-btn:active { color: var(--accent); }
  .day-name-input {
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 8px; padding: 6px 10px; color: var(--text);
    font-family: 'Bebas Neue', sans-serif; font-size: 24px;
    width: 100%; letter-spacing: 1px; -webkit-appearance: none;
  }
  .day-name-input:focus { outline: none; }
  .day-sub-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    width: 100%; margin-top: 6px; -webkit-appearance: none;
  }
  .day-sub-input:focus { outline: none; border-color: var(--accent); }
  .day-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
  .day-edit-actions button {
    padding: 7px 16px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .day-edit-actions .ok { background: var(--accent); color: #000; }
  .day-edit-actions .cancel { background: var(--border); color: var(--text); }
  .progress-ring { position: relative; width: 52px; height: 52px; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--accent);
  }

  /* EXERCISES */
  .exercises { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .exercise-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; transition: all 0.3s;
  }
  .exercise-card.done { background: var(--done); border-color: var(--done-border); }
  .exercise-card.custom-ex { border-left: 3px solid var(--accent); }
  .exercise-header { display: flex; align-items: center; padding: 14px 16px; gap: 12px; user-select: none; }
  .ex-number { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--muted); min-width: 28px; line-height: 1; }
  .exercise-card.done .ex-number { color: var(--done-border); }
  .ex-info { flex: 1; cursor: pointer; min-width: 0; }
  .ex-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .exercise-card.done .ex-name { color: #a8e06a; }
  .ex-sets { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ex-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .gif-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--accent); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--accent); transition: all 0.2s;
  }
  .gif-btn:active { transform: scale(0.9); background: var(--accent); color: #000; }
  .check-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .exercise-card.done .check-btn { background: var(--done-border); border-color: var(--done-border); }
  .check-icon { font-size: 16px; }
  .del-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,80,80,0.3); background: transparent;
    color: rgba(255,80,80,0.6); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .del-btn:active { background: rgba(255,80,80,0.15); }

  /* SET LOG */
  .set-log { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .exercise-card.expanded .set-log { display: block; }
  .exercise-card.done .set-log { border-color: rgba(106,191,58,0.2); }
  .set-log-title { font-size: 11px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; margin-top: 12px; }
  .set-rows { display: flex; flex-direction: column; gap: 8px; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 8px; align-items: center; }
  .set-num { font-size: 12px; color: var(--muted); font-weight: 500; }
  .set-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    text-align: center; width: 100%; -webkit-appearance: none;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 11px; }
  .set-tip { margin-top: 12px; font-size: 12px; color: var(--muted); line-height: 1.55; }

  /* BUTTONS */
  .add-ex-btn {
    margin: 10px 20px 0; width: calc(100% - 40px);
    background: transparent; border: 1px dashed var(--border);
    border-radius: 14px; padding: 14px; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .add-ex-btn:active { border-color: var(--accent); color: var(--accent); }
  .complete-btn {
    margin: 14px 20px 0; width: calc(100% - 40px);
    background: var(--accent); color: #000; border: none;
    border-radius: 14px; padding: 16px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
  }
  .complete-btn:active { transform: scale(0.98); opacity: 0.9; }
  .complete-btn.all-done { background: var(--done-border); }

  /* REST DAY */
  .rest-day { padding: 48px 20px; text-align: center; }
  .rest-icon { font-size: 64px; margin-bottom: 16px; }
  .rest-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--muted); letter-spacing: 2px; }
  .rest-sub { font-size: 14px; color: var(--muted); margin-top: 8px; }

  .divider { height: 1px; background: var(--border); margin: 0 20px 16px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: rgba(12,12,12,0.96); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 8px 20px env(safe-area-inset-bottom, 16px); gap: 8px;
    z-index: 200;
  }
  .nav-btn {
    background: transparent; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    padding: 8px 4px; border-radius: 12px; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* PROFILE PAGE */
  .profile-header {
    padding: 52px 20px 20px;
    background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
  }
  .profile-header-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: var(--accent); }

  /* PROFILE CARD */
  .profile-card {
    margin: 16px 20px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 18px;
  }
  .profile-card-top { display: flex; align-items: center; gap: 14px; }
  .avatar-lg {
    width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #000;
  }
  .profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; line-height: 1; }
  .profile-since { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .edit-name-btn {
    margin-left: auto; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 12px; cursor: pointer;
  }

  /* METRICS */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 12px;
  }
  .metrics-section { padding: 0 20px 16px; }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  .metric-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .metric-num { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: var(--accent); line-height: 1; margin-top: 4px; }
  .metric-unit { font-size: 14px; color: var(--muted); font-family: 'DM Sans', sans-serif; }
  .input-row { display: flex; gap: 8px; align-items: stretch; }
  .metric-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; -webkit-appearance: none;
  }
  .metric-input:focus { outline: none; border-color: var(--accent); }
  .metric-input::placeholder { color: var(--muted); }
  .save-btn {
    background: var(--accent); color: #000; border: none;
    border-radius: 10px; padding: 10px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }

  /* BMI */
  .bmi-box {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 20px; margin: 0 20px 16px;
  }
  .bmi-num { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; }
  .bmi-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .bmi-cat { font-size: 14px; font-weight: 600; margin-top: 4px; }

  /* WEIGHT HISTORY */
  .weight-section { padding: 0 20px; }
  .weight-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 0; border-bottom: 1px solid var(--border);
  }
  .weight-entry:last-child { border-bottom: none; }
  .w-date { font-size: 13px; color: var(--muted); }
  .w-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .w-diff { font-size: 12px; font-weight: 600; }
  .w-diff.up { color: #ff6b6b; }
  .w-diff.dn { color: var(--done-border); }

  /* TEAM */
  .team-section { padding: 0 20px; margin-top: 8px; }
  .user-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s;
  }
  .user-item.me { border-color: var(--accent); }
  .user-item:active { opacity: 0.8; }
  .u-avatar {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #000;
  }
  .u-info { flex: 1; }
  .u-name { font-size: 15px; font-weight: 600; }
  .u-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .active-badge { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .add-user-btn {
    width: 100%; background: transparent; border: 1px dashed var(--border);
    border-radius: 14px; padding: 14px; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
    text-align: center; transition: all 0.2s;
  }
  .add-user-btn:active { border-color: var(--accent); color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 96px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--done-border); color: #000;
    font-weight: 600; font-size: 14px;
    padding: 12px 24px; border-radius: 30px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODALS */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 500;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--card); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px; padding-bottom: 48px;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .sheet-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; padding: 16px 20px 4px; color: var(--accent); }
  .sheet-sub { font-size: 13px; color: var(--muted); padding: 0 20px 14px; }
  .sheet-body { padding: 0 20px; }
  .sheet-footer { padding: 0 20px; }
  .sheet-btn {
    width: 100%; border: none; border-radius: 12px; padding: 14px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
    cursor: pointer; margin-top: 10px;
  }
  .sheet-btn.primary { background: var(--accent); color: #000; }
  .sheet-btn.secondary { background: var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0; }

  /* VIDEO MODAL */
  .video-wrap { background: #111; display: flex; align-items: center; justify-content: center; min-height: 200px; position: relative; }
  .video-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
  .tip-box { margin: 14px 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-size: 13px; line-height: 1.6; color: #ccc; }
  .tip-title { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 6px; }

  /* FORM */
  .form-group { margin-bottom: 12px; }
  .form-label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .form-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; -webkit-appearance: none;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* COLOR PICKER */
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .color-dot {
    width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer; transition: all 0.2s; border: 3px solid transparent;
  }
  .color-dot.picked { border-color: white; transform: scale(1.15); }

  /* NAME EDIT */
  .name-edit-input {
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 8px; padding: 6px 10px; color: var(--text);
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; width: 100%; letter-spacing: 1px;
  }
  .name-edit-input:focus { outline: none; }
  .name-edit-row { display: flex; gap: 8px; margin-top: 8px; }
  .name-edit-row button {
    padding: 6px 14px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .name-edit-row .confirm { background: var(--accent); color: #000; }
  .name-edit-row .cancel { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<!-- ====== WORKOUT PAGE ====== -->
<div id="page-workout" class="page active">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">ANTRENMAN</div>
        <div class="date-text" id="dateText"></div>
      </div>
      <button class="user-pill" onclick="openSwitcher()">
        <div class="user-avatar" id="hAvatar"></div>
        <span class="user-pill-name" id="hName"></span>
      </button>
    </div>
    <div class="week-nav" id="weekNav"></div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="divider"></div>
  <div id="workoutContent"></div>
</div>

<!-- ====== PROFILE PAGE ====== -->
<div id="page-profile" class="page">
  <div class="profile-header">
    <div class="profile-header-title">PROFİL</div>
  </div>
  <div id="profileContent"></div>
</div>

<!-- ====== BOTTOM NAV ====== -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="switchPage('workout')">

  </div>
</div>

<!-- ====== ADD EXERCISE MODAL ====== -->
<div class="overlay" id="addExOverlay" onclick="closeAddEx(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">EGZERSİZ EKLE</div>
    <div class="sheet-sub">Kendi hareketini ekle</div>

        <label class="form-label">Hareket Adı</label>

        <div class="form-group">
          <label class="form-label">Set Sayısı</label>
          <input class="form-input" id="exSets" type="number" inputmode="numeric" placeholder="3">

        <div class="form-group">
          <label class="form-label">Tekrar</label>
          <input class="form-input" id="exReps" type="text" placeholder="12">

      <div class="form-group">
        <label class="form-label">Teknik Notu (opsiyonel)</label>

      <button class="sheet-btn primary" onclick="saveExercise()">EKLE</button>
      <button class="sheet-btn secondary" onclick="document.getElementById('addExOverlay').classList.remove('open')">İptal</button>

  </div>
</div>

</div>

<script>
// ============================================================
// DATA
// ============================================================
const COLORS = ['#e8ff47','#47e8ff','#ff6b6b','#ff9a3c','#3cffb8','#c97fff','#ff47b0','#ffcb47'];

const TIPS = {
  "Machine Chest Press": "Sırtını koltuğa tam yasla. Kolları göğüs hizasında tut, dirsekler 90 derece. İterken nefes ver, geri alırken al.",

  "Shoulder Press": "Dirsekler 90 dereceden başla. Kolu tam açmadan hafif bük. Beli aşırı arkaya verme.",

  "Leg Extension": "Tam yukarı aç, 1 saniye tut, yavaş in. Kalçalar koltuğa yapışık kalsın.",

  "Lat Pulldown": "Geniş tutuş. Göğse çekerken hafif arkaya yaslan. Omuz küreklerini aşağı sıkıştır.",
  "Cable Row (tek kol)": "Tek elle çekerken gövdeyi döndürme. Dirsek geride kalacak. Sırt kasını hisset.",
  "Bicep Curl (bar)": "Dirsekler sabit, vücuda yapışık. Sallamadan kaldır. Tam yukarı, yavaş aşağı.",
  "Hammer Curl": "Başparmak yukarı, nötr tutuş. Dirsek sabit. Hem ön kol hem bicep çalışır.",
  "Bulgarian Split Squat": "Arka ayak bench üzerinde. Ön ayak yeterince önde. Dik in, diz öne geçmesin.",
  "Hip Thrust": "Omuz kürekler bench üzerinde. Kalçayı tam yukarı kaldır, 1 sn sıkıştır."
};

const VIDEOS = {
  "Machine Chest Press": "https://media.musclewiki.com/media/uploads/videos/branded/male-machine-chest-press-front.mp4",
  "İncline Dumbbell Press": "https://media.musclewiki.com/media/uploads/videos/branded/male-dumbbell-incline-bench-press-front.mp4",
  "Shoulder Press": "https://media.musclewiki.com/media/uploads/videos/branded/male-dumbbell-shoulder-press-front.mp4",
  "Lateral Raise": "https://media.musclewiki.com/media/uploads/videos/branded/male-dumbbell-lateral-raise-front.mp4",
  "Tricep Pushdown": "https://media.musclewiki.com/media/uploads/videos/branded/male-cables-tricep-pushdown-front.mp4",
  "Face Pull": "https://media.musclewiki.com/media/uploads/videos/branded/male-cables-face-pull-front.mp4",
  "Squat": "https://media.musclewiki.com/media/uploads/videos/branded/male-barbell-squat-front.mp4",
  "Leg Press": "https://media.musclewiki.com/media/uploads/videos/branded/male-machine-leg-press-front.mp4",
  "Leg Extension": "https://media.musclewiki.com/media/uploads/videos/branded/male-machine-leg-extension-front.mp4",
  "Romanian Deadlift": "https://media.musclewiki.com/media/uploads/videos/branded/male-barbell-romanian-deadlift-front.mp4",
  "Leg Curl": "https://media.musclewiki.com/media/uploads/videos/branded/male-machine-seated-leg-curl-front.mp4",
  "Calf Raise": "https://media.musclewiki.com/media/uploads/videos/branded/male-machine-calf-raise-front.mp4",
  "Barbell Row": "https://media.musclewiki.com/media/uploads/videos/branded/male-barbell-bent-over-row-front.mp4",
  "Lat Pulldown": "https://media.musclewiki.com/media/uploads/videos/branded/male-cables-lat-pulldown-front.mp4",
  "Cable Row (tek kol)": "https://media.musclewiki.com/media/uploads/videos/branded/male-cables-seated-cable-row-front.mp4",
  "Bicep Curl (bar)": "https://media.musclewiki.com/media/uploads/videos/branded/male-barbell-curl-front.mp4",
  "Hammer Curl": "https://media.musclewiki.com/media/uploads/videos/branded/male-dumbbell-hammer-curl-front.mp4",
  "Bulgarian Split Squat": "https://media.musclewiki.com/media/uploads/videos/branded/male-dumbbell-bulgarian-split-squat-front.mp4",
  "Hip Thrust": "https://media.musclewiki.com/media/uploads/videos/branded/male-barbell-hip-thrust-front.mp4"
};

const BASE_PROGRAM = {
  1: { name:"UPPER A", sub:"İtme Ağırlıklı", exercises:[
    {name:"Machine Chest Press",sets:4,reps:"10"},
    {name:"İncline Dumbbell Press",sets:3,reps:"10"},
    {name:"Shoulder Press",sets:3,reps:"10"},
    {name:"Lateral Raise",sets:3,reps:"15"},
    {name:"Tricep Pushdown",sets:3,reps:"12"},
    {name:"Face Pull",sets:3,reps:"15"}
  ]},
  2: { name:"LOWER A", sub:"Quad Ağırlıklı", exercises:[
    {name:"Squat",sets:4,reps:"8"},
    {name:"Leg Press",sets:3,reps:"12"},
    {name:"Leg Extension",sets:3,reps:"15"},
    {name:"Romanian Deadlift",sets:3,reps:"10"},
    {name:"Leg Curl",sets:3,reps:"12"},
    {name:"Calf Raise",sets:4,reps:"15"}
  ]},
  3: null,
  4: { name:"UPPER B", sub:"Çekme Ağırlıklı", exercises:[
    {name:"Barbell Row",sets:4,reps:"8"},
    {name:"Lat Pulldown",sets:3,reps:"10"},
    {name:"Cable Row (tek kol)",sets:3,reps:"10"},
    {name:"Face Pull",sets:3,reps:"15"},
    {name:"Bicep Curl (bar)",sets:3,reps:"12"},
    {name:"Hammer Curl",sets:3,reps:"12"}
  ]},
  5: { name:"LOWER B", sub:"Posterior Chain", exercises:[
    {name:"Romanian Deadlift",sets:4,reps:"8"},
    {name:"Bulgarian Split Squat",sets:3,reps:"10/taraf"},
    {name:"Leg Curl",sets:3,reps:"12"},
    {name:"Hip Thrust",sets:3,reps:"12"},
    {name:"Leg Extension",sets:3,reps:"12"},
    {name:"Calf Raise",sets:4,reps:"15"}
  ]},
  6: null,
  7: null
};

// ============================================================
// STATE
// ============================================================
function loadProfiles() {
  return JSON.parse(localStorage.getItem('gym_profiles') || 'null') || { currentId: null, users: [] };
}
function saveProfiles() { localStorage.setItem('gym_profiles', JSON.stringify(profiles)); }
function loadUserData(uid) {
  return JSON.parse(localStorage.getItem('gym_' + uid) || 'null') || {
    currentWeek: 1, currentDay: 1, weeks: {},
    metrics: { height: null, weightLog: [] },
    custom: {}, dayNames: {}
  };
}
function saveData() { localStorage.setItem('gym_' + profiles.currentId, JSON.stringify(st)); }

let profiles = loadProfiles();

// Init default user
if (!profiles.users.length) {
  const u = { id: '1', name: 'Yusuf', color: COLORS[0], created: Date.now(), useBaseProgram: true };
  profiles.users.push(u);
  profiles.currentId = u.id;
  saveProfiles();
}

// Migrasyon: eski kayıtlarda useBaseProgram yoksa ekle (id '1' = Yusuf)
if (profiles.users[0]?.id === '1' && !profiles.users[0].useBaseProgram) {
  profiles.users[0].useBaseProgram = true;
  saveProfiles();
}
if (!profiles.currentId) { profiles.currentId = profiles.users[0].id; saveProfiles(); }

let st = loadUserData(profiles.currentId);

function me() { return profiles.users.find(u => u.id === profiles.currentId); }
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }

function switchUser(uid) {
  saveData();
  profiles.currentId = uid;
  saveProfiles();
  st = loadUserData(uid);
  setAccent(me().color);
  document.getElementById('switcherOverlay').classList.remove('open');
  render();
}

function setAccent(c) { document.documentElement.style.setProperty('--accent', c); }

// ============================================================
// HELPERS
// ============================================================
function weekData(w) { if (!st.weeks[w]) st.weeks[w] = {}; return st.weeks[w]; }
function dayData(w, d) { const wd = weekData(w); if (!wd[d]) wd[d] = { completed:false, exercises:{} }; return wd[d]; }
function exData(w, d, i) { const dd = dayData(w,d); if (!dd.exercises[i]) dd.exercises[i] = {done:false,sets:{}}; return dd.exercises[i]; }

function dayProgram(d) {
  const useBase = !!me().useBaseProgram;
  const base = useBase ? BASE_PROGRAM[d] : null;
  const cust = st.custom[d] || [];
  const dn = (st.dayNames || {})[d] || {};
  // Null = rest/empty day
  if (!base && cust.length === 0 && !dn.name) return null;
  return {
    name: dn.name || base?.name || '',
    sub: dn.sub || base?.sub || '',
    exercises: [...(base?.exercises || []), ...cust.map(c => ({...c, isCustom:true}))]
  };
}

// ============================================================
// PAGE SWITCH
// ============================================================
function switchPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('nav-' + p).classList.add('active');
  if (p === 'profile') renderProfile();
}

// ============================================================
// RENDER HEADER
// ============================================================
function renderHeader() {
  const u = me();
  const av = document.getElementById('hAvatar');
  av.textContent = initials(u.name);
  av.style.background = u.color;
  document.getElementById('hName').textContent = u.name;
  const now = new Date();
  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('dateText').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
}

function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  for (let w = 1; w <= 16; w++) {
    const b = document.createElement('button');
    b.className = 'week-btn' + (w === st.currentWeek ? ' active' : '');
    b.textContent = 'H' + w;
    b.onclick = () => { st.currentWeek = w; saveData(); render(); };
    nav.appendChild(b);
  }
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  const wd = weekData(st.currentWeek);
  let sets = 0;
  for (let d = 1; d <= 7; d++) {
    if (wd[d]?.exercises) Object.values(wd[d].exercises).forEach(ex => Object.values(ex.sets||{}).forEach(s => { if (s.weight) sets++; }));
  }
  const done = [1,2,4,5].filter(d => wd[d]?.completed).length;
  const lastW = st.metrics?.weightLog?.slice(-1)[0]?.weight;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-box"><div class="stat-val">${done}/4</div><div class="stat-label">Bu Hafta</div></div>
    <div class="stat-box"><div class="stat-val">${st.currentWeek}</div><div class="stat-label">Hafta</div></div>
    <div class="stat-box"><div class="stat-val">${lastW || '—'}</div><div class="stat-label">Kilo (kg)</div></div>
  `;
}

// ============================================================
// DAY TABS
// ============================================================
function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  const wd = weekData(st.currentWeek);
  const labels = {1:'Gün 1',2:'Gün 2',3:'Gün 3',4:'Gün 4',5:'Gün 5',6:'Gün 6',7:'Gün 7'};
  for (let d = 1; d <= 7; d++) {
    const el = document.createElement('div');
    el.className = 'day-tab' + (d === st.currentDay ? ' active' : '') + (wd[d]?.completed ? ' completed' : '');
    const useBase = !!me().useBaseProgram;
    const p = BASE_PROGRAM[d];
    const dn = (st.dayNames || {})[d] || {};
    const hasCust = (st.custom[d] || []).length > 0;
    let dname;
    if (dn.name) {
      dname = dn.name.split(' ')[0];
    } else if (useBase && p) {
      dname = p.name.split(' ')[0];
    } else if (useBase && !p) {
      dname = d === 6 ? 'AKTİF' : 'DİN';
    } else if (hasCust) {
      dname = 'AKT';
    } else {
      dname = '—';
    }
    el.innerHTML = `<div class="day-label">${labels[d]}</div><div class="day-name">${dname}</div><div class="day-dot"></div>`;
    el.onclick = () => { st.currentDay = d; saveData(); renderWorkout(); renderDayTabs(); };
    tabs.appendChild(el);
  }
}

// ============================================================
// WORKOUT
// ============================================================
function renderWorkout() {
  const content = document.getElementById('workoutContent');
  const d = st.currentDay, w = st.currentWeek;
  const prog = dayProgram(d);
  const user = me();

  if (!prog) {
    const useBase = !!me().useBaseProgram;
    if (!useBase) {
      // Yeni kullanıcı — boş gün, setup prompt göster
      content.innerHTML = `
        <div class="rest-day">
          <div class="rest-icon">📋</div>
          <div class="rest-title">BOŞ GÜN</div>
          <div class="rest-sub">Bu güne henüz egzersiz eklemedin.</div>
        </div>
        <button class="add-ex-btn" style="margin-top:0;" onclick="openAddEx()">+ Egzersiz Ekle</button>
        <div style="height:20px;"></div>
      `;
      return;
    }
    // Yusuf'un dinlenme günleri
    const msgs = {
      3: ['🧘','DİNLENME','Bugün kaslarını dinlendir. Aktif toparlanma.'],
      6: ['🚴','AKTİF DİNLENME','30-45 dk yürüyüş veya bisiklet.'],
      7: ['😴','TAM DİNLENME','Uyu, ye, iyi hisset. Yarın güçlü dön.']
    };
    const m = msgs[d] || ['🏖️','DİNLENME',''];
    content.innerHTML = `<div class="rest-day"><div class="rest-icon">${m[0]}</div><div class="rest-title">${m[1]}</div><div class="rest-sub">${m[2]}</div></div>`;
    return;
  }

  const dd = dayData(w, d);
  const total = prog.exercises.length;
  const doneCount = Object.values(dd.exercises).filter(e => e.done).length;
  const C = 2 * Math.PI * 20;
  const off = C - (doneCount / total) * C;

  content.innerHTML = `
    <div class="workout-header">
      <div id="dayTitleArea">
        <div class="title-row">
          <div class="workout-title">${prog.name}</div>
          <button class="edit-day-btn" onclick="editDayName()">✏</button>
        </div>
        <div class="workout-sub">${prog.sub} · ${total} egzersiz</div>
      </div>
      <div class="progress-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="20" fill="none" stroke="#2a2a2a" stroke-width="3"/>
          <circle cx="26" cy="26" r="20" fill="none" stroke="${user.color}" stroke-width="3"
            stroke-dasharray="${C}" stroke-dashoffset="${off}"
            stroke-linecap="round" style="transition:stroke-dashoffset 0.4s"/>
        </svg>
        <div class="progress-ring-text">${doneCount}/${total}</div>
      </div>
    </div>
    <div class="section-label">EGZERSİZLER</div>
    <div class="exercises" id="exList"></div>
    <button class="add-ex-btn" onclick="openAddEx()">+ Egzersiz Ekle</button>
    <button class="complete-btn ${dd.completed ? 'all-done' : ''}" onclick="completeDay()">
      ${dd.completed ? '✓ TAMAMLANDI' : 'ANTRENMAN BİTTİ'}
    </button>
    <div style="height:20px;"></div>
  `;

  const baseLen = BASE_PROGRAM[d]?.exercises?.length || 0;
  const list = document.getElementById('exList');
  prog.exercises.forEach((ex, i) => {
    const ed = exData(w, d, i);
    const card = document.createElement('div');
    card.className = 'exercise-card' + (ed.done ? ' done' : '') + (ex.isCustom ? ' custom-ex' : '');
    card.id = 'ex' + i;

    let setsHtml = '';
    for (let s = 0; s < ex.sets; s++) {
      const sd = ed.sets[s] || {};
      setsHtml += `
        <div class="set-row">
          <div class="set-num">S${s+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
            value="${sd.weight||''}" onchange="logSet(${i},${s},'weight',this.value)">
          <input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps} tekrar"
            value="${sd.reps||''}" onchange="logSet(${i},${s},'reps',this.value)">
        </div>`;
    }

    const tip = ex.tip || TIPS[ex.name] || '';
    const hasVid = !!VIDEOS[ex.name];
    const custIdx = i - baseLen;
    const n = ex.name.replace(/'/g,"\\'");
    const meta = ex.sets + ' set · ' + ex.reps + ' tekrar';

    card.innerHTML = `
      <div class="exercise-header">
        <div class="ex-number">${String(i+1).padStart(2,'0')}</div>
        <div class="ex-info" onclick="toggleEx(${i})">
          <div class="ex-name">${ex.name}${ex.isCustom ? ' <span style="font-size:10px;color:var(--muted);font-weight:400;vertical-align:middle;">ÖZEL</span>' : ''}</div>
          <div class="ex-sets">${ex.sets} set · ${ex.reps} tekrar</div>
        </div>
        <div class="ex-actions">
          ${hasVid ? `<button class="gif-btn" onclick="openVideo('${n}','${meta}')">▶</button>` : ''}
          ${ex.isCustom ? `<button class="del-btn" onclick="delCustomEx(${custIdx})">✕</button>` : ''}
          <button class="check-btn" onclick="markEx(${i})">
            <span class="check-icon">${ed.done ? '✓' : ''}</span>
          </button>
        </div>
      </div>
      <div class="set-log">
        <div class="set-log-title">Set Kayıt</div>
        <div class="set-rows">${setsHtml}</div>
        ${tip ? `<div class="set-tip">💡 ${tip}</div>` : ''}
      </div>`;
    list.appendChild(card);
  });
}

function toggleEx(i) { document.getElementById('ex'+i).classList.toggle('expanded'); }
function markEx(i) { const ed = exData(st.currentWeek, st.currentDay, i); ed.done = !ed.done; saveData(); renderWorkout(); }
function logSet(ei, si, f, v) { const ed = exData(st.currentWeek, st.currentDay, ei); if (!ed.sets[si]) ed.sets[si] = {}; ed.sets[si][f] = v; saveData(); renderStats(); }
function completeDay() { const dd = dayData(st.currentWeek, st.currentDay); dd.completed = !dd.completed; saveData(); if (dd.completed) toast('✓ Antrenman tamamlandı!'); render(); }

// ============================================================
// CUSTOM EXERCISES
// ============================================================
let addExDay = null;
function openAddEx() {
  addExDay = st.currentDay;
  ['exName','exSets','exReps','exTip'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addExOverlay').classList.add('open');
}
function closeAddEx(e) { if (e.target.id === 'addExOverlay') document.getElementById('addExOverlay').classList.remove('open'); }
function saveExercise() {
  const name = document.getElementById('exName').value.trim();
  if (!name) { document.getElementById('exName').focus(); return; }
  const sets = parseInt(document.getElementById('exSets').value) || 3;
  const reps = document.getElementById('exReps').value.trim() || '10';
  const tip = document.getElementById('exTip').value.trim();
  if (!st.custom[addExDay]) st.custom[addExDay] = [];
  st.custom[addExDay].push({ name, sets, reps, tip, isCustom: true });
  saveData();
  document.getElementById('addExOverlay').classList.remove('open');
  renderWorkout();
}
function delCustomEx(ci) {
  const d = st.currentDay;
  if (st.custom[d]) { st.custom[d].splice(ci, 1); saveData(); renderWorkout(); }
}

// ============================================================
// VIDEO MODAL
// ============================================================
function openVideo(name, meta) {
  document.getElementById('vTitle').textContent = name;
  document.getElementById('vMeta').textContent = meta;
  document.getElementById('vTip').textContent = TIPS[name] || 'Hareketi kontrollü ve tam aralıkta yap.';
  const videoUrl = VIDEOS[name] || '';
  const img = document.getElementById('vImg');
  const loading = document.getElementById('vLoading');
  let vid = document.getElementById('vidEl');
  if (!vid) {
    vid = document.createElement('video');
    vid.id = 'vidEl'; vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
    vid.style.cssText = 'width:100%;max-height:320px;object-fit:cover;background:#000;display:block;';
    img.parentNode.insertBefore(vid, img);
  }
  if (videoUrl) {
    img.style.display = 'none'; loading.style.display = 'none'; vid.style.display = 'block';
    vid.src = videoUrl; vid.load(); vid.play().catch(() => {});
  } else {
    vid.style.display = 'none'; img.style.display = 'none';
    loading.style.display = 'flex'; loading.textContent = 'Video bulunamadı.';
  }
  document.getElementById('videoOverlay').classList.add('open');
}
function closeVideo(e) { if (e.target.id === 'videoOverlay') closeVideoModal(); }
function closeVideoModal() {
  document.getElementById('videoOverlay').classList.remove('open');
  const v = document.getElementById('vidEl'); if (v) { v.pause(); v.src = ''; }
}

// ============================================================
// USER SWITCHER
// ============================================================
function openSwitcher() {
  const list = document.getElementById('switcherList');
  list.innerHTML = '';
  profiles.users.forEach(u => {
    const el = document.createElement('div');
    el.className = 'user-item' + (u.id === profiles.currentId ? ' me' : '');
    el.innerHTML = `
      <div class="u-avatar" style="background:${u.color}">${initials(u.name)}</div>
      <div class="u-info">
        <div class="u-name">${u.name}</div>
        <div class="u-sub">${u.id === profiles.currentId ? 'Aktif kullanıcı' : 'Geçmek için tıkla'}</div>
      </div>
      ${u.id === profiles.currentId ? '<span class="active-badge">AKTİF</span>' : ''}
    `;
    if (u.id !== profiles.currentId) el.onclick = () => switchUser(u.id);
    list.appendChild(el);
  });
  document.getElementById('switcherOverlay').classList.add('open');
}
function closeSwitcher(e) { if (e.target.id === 'switcherOverlay') document.getElementById('switcherOverlay').classList.remove('open'); }

// ============================================================
// ADD USER
// ============================================================
let pickedColor = COLORS[0];
function openAddUser() {
  document.getElementById('switcherOverlay').classList.remove('open');
  document.getElementById('newUserName').value = '';
  pickedColor = COLORS[profiles.users.length % COLORS.length];
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === pickedColor ? ' picked' : '');
    d.style.background = c;
    d.onclick = () => { pickedColor = c; document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('picked')); d.classList.add('picked'); };
    row.appendChild(d);
  });
  document.getElementById('addUserOverlay').classList.add('open');
}
function closeAddUser(e) { if (e.target.id === 'addUserOverlay') document.getElementById('addUserOverlay').classList.remove('open'); }
function saveUser() {
  const name = document.getElementById('newUserName').value.trim();
  if (!name) { document.getElementById('newUserName').focus(); return; }
  const u = { id: Date.now().toString(), name, color: pickedColor, created: Date.now() };
  profiles.users.push(u);
  saveProfiles();
  document.getElementById('addUserOverlay').classList.remove('open');
  switchUser(u.id);
}

// ============================================================
// PROFILE PAGE
// ============================================================
function renderProfile() {
  const u = me();
  const m = st.metrics || { height: null, weightLog: [] };
  const lastW = m.weightLog.slice(-1)[0]?.weight || null;
  const bmi = m.height && lastW ? (lastW / ((m.height/100)**2)).toFixed(1) : null;
  let bmiColor = '#aaa', bmiCat = '';
  if (bmi) {
    if (bmi < 18.5)      { bmiColor = '#47b8ff'; bmiCat = 'Zayıf'; }
    else if (bmi < 25)   { bmiColor = '#6abf3a'; bmiCat = 'Normal'; }
    else if (bmi < 30)   { bmiColor = '#ffce47'; bmiCat = 'Fazla Kilolu'; }
    else                 { bmiColor = '#ff6b6b'; bmiCat = 'Obez'; }
  }

  const recent = m.weightLog.slice(-7).reverse();
  let histHtml = recent.length ? '' : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">Henüz kilo kaydı yok.</div>';
  recent.forEach((e, i) => {
    const prev = recent[i+1];
    let diffHtml = '';
    if (prev) {
      const d = (e.weight - prev.weight).toFixed(1);
      const cls = d > 0 ? 'up' : (d < 0 ? 'dn' : '');
      const sign = d > 0 ? '+' : '';
      if (d != 0) diffHtml = `<span class="w-diff ${cls}">${sign}${d}kg</span>`;
    }
    histHtml += `<div class="weight-entry"><span class="w-date">${e.date}</span><div style="display:flex;align-items:center;gap:8px;">${diffHtml}<span class="w-val">${e.weight} kg</span></div></div>`;
  });

  let chartHtml = '';
  if (m.weightLog.length >= 2) {
    const pts10 = m.weightLog.slice(-10);
    const ws = pts10.map(e => e.weight);
    const mn = Math.min(...ws)-0.5, mx = Math.max(...ws)+0.5;
    const W=340, H=70;
    const points = ws.map((w,i) => `${(i/(ws.length-1))*(W-20)+10},${H-((w-mn)/(mx-mn))*(H-20)-10}`).join(' ');
    chartHtml = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;margin-bottom:12px;">
      <polyline points="${points}" fill="none" stroke="${u.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${ws.map((w,i) => { const x=(i/(ws.length-1))*(W-20)+10, y=H-((w-mn)/(mx-mn))*(H-20)-10; return `<circle cx="${x}" cy="${y}" r="4" fill="${u.color}"/>`; }).join('')}
    </svg>`;
  }

  const usersHtml = profiles.users.map(u2 => `
    <div class="user-item ${u2.id===profiles.currentId?'me':''}" ${u2.id!==profiles.currentId?`onclick="switchUser('${u2.id}')"`:''}>
      <div class="u-avatar" style="background:${u2.color}">${initials(u2.name)}</div>
      <div class="u-info"><div class="u-name">${u2.name}</div><div class="u-sub">${u2.id===profiles.currentId?'Aktif':'Geçmek için tıkla'}</div></div>
      ${u2.id===profiles.currentId?'<span class="active-badge">AKTİF</span>':''}
    </div>`).join('');

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-card">
      <div class="profile-card-top">
        <div class="avatar-lg" style="background:${u.color}">${initials(u.name)}</div>
        <div id="nameArea" style="flex:1;">
          <div class="profile-name">${u.name}</div>
          <div class="profile-since">Üye · ${new Date(u.created).toLocaleDateString('tr-TR')}</div>
        </div>
        <button class="edit-name-btn" onclick="editName()">Düzenle</button>
      </div>
    </div>

    <div class="metrics-section">
      <div class="section-title">VÜCUT METRİKLERİ</div>
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-lbl">Boy</div>
          <div class="metric-num">${m.height||'—'}<span class="metric-unit"> cm</span></div>
        </div>
        <div class="metric-box">
          <div class="metric-lbl">Kilo</div>
          <div class="metric-num">${lastW||'—'}<span class="metric-unit"> kg</span></div>
        </div>
      </div>
      <div class="input-row">
        <input class="metric-input" id="hInput" type="number" inputmode="decimal" placeholder="Boy (cm)" value="${m.height||''}">
        <input class="metric-input" id="wInput" type="number" inputmode="decimal" placeholder="Kilo (kg)">
        <button class="save-btn" onclick="saveMetrics()">Kaydet</button>
      </div>
    </div>

    ${bmi ? `
    <div class="bmi-box">
      <div>
        <div class="bmi-lbl">VKİ (BMI)</div>
        <div class="bmi-num" style="color:${bmiColor}">${bmi}</div>
        <div class="bmi-cat" style="color:${bmiColor}">${bmiCat}</div>
      </div>
      <div style="font-size:48px;">⚖️</div>
    </div>` : ''}

    <div class="weight-section">
      <div class="section-title">KİLO GEÇMİŞİ</div>
      ${chartHtml}
      ${histHtml}
    </div>

    <div class="team-section" style="margin-top:24px;">
      <div class="section-title">TAKIM</div>
      ${usersHtml}
      <button class="add-user-btn" onclick="openAddUser()">+ Arkadaş Ekle</button>
    </div>
    <div style="height:24px;"></div>
  `;
}

function saveMetrics() {
  const h = parseFloat(document.getElementById('hInput').value);
  const w = parseFloat(document.getElementById('wInput').value);
  if (!st.metrics) st.metrics = { height: null, weightLog: [] };
  if (h > 100 && h < 250) st.metrics.height = h;
  if (w > 30 && w < 300) {
    const today = new Date().toLocaleDateString('tr-TR');
    const log = st.metrics.weightLog;
    const idx = log.findIndex(e => e.date === today);
    if (idx >= 0) log[idx].weight = w; else log.push({ date: today, weight: w });
  }
  saveData(); renderStats(); renderProfile(); toast('✓ Kaydedildi');
}

function editName() {
  const u = me();
  document.getElementById('nameArea').innerHTML = `
    <input class="name-edit-input" id="nameIn" type="text" value="${u.name}" maxlength="20">
    <div class="name-edit-row">
      <button class="confirm" onclick="saveName()">Kaydet</button>
      <button class="cancel" onclick="renderProfile()">İptal</button>
    </div>`;
  document.getElementById('nameIn').focus();
}
function saveName() {
  const v = document.getElementById('nameIn').value.trim();
  if (!v) return;
  me().name = v; saveProfiles(); renderHeader(); renderProfile();
}

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// DAY NAME EDIT
// ============================================================
function editDayName() {
  const d = st.currentDay;
  const prog = dayProgram(d);
  const area = document.getElementById('dayTitleArea');
  area.innerHTML = `
    <input class="day-name-input" id="editNameIn" type="text" value="${prog.name}" placeholder="Antrenman adı" maxlength="20">
    <input class="day-sub-input" id="editSubIn" type="text" value="${(st.dayNames||{})[d]?.sub || BASE_PROGRAM[d]?.sub || ''}" placeholder="Alt başlık" maxlength="30">
    <div class="day-edit-actions">
      <button class="ok" onclick="saveDayName()">Kaydet</button>
      <button class="cancel" onclick="renderWorkout()">İptal</button>
    </div>
  `;
  document.getElementById('editNameIn').focus();
  document.getElementById('editNameIn').select();
}

function saveDayName() {
  const d = st.currentDay;
  const name = document.getElementById('editNameIn').value.trim();
  const sub = document.getElementById('editSubIn').value.trim();
  if (!st.dayNames) st.dayNames = {};
  st.dayNames[d] = {
    name: name || BASE_PROGRAM[d]?.name || '',
    sub: sub || BASE_PROGRAM[d]?.sub || ''
  };
  saveData();
  renderWorkout();
  renderDayTabs();
  toast('✓ Kaydedildi');
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  renderHeader(); renderWeekNav(); renderStats(); renderDayTabs(); renderWorkout();
}

setAccent(me().color);
render();
</script>
</body>
</html>
